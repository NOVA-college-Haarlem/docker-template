services:
  web:
    build:
      context: .
      dockerfile: ./.docker/web/Dockerfile
    volumes:
      - ./www:/var/www/html
      - ./vendor:/var/www/vendor
    ports:
      - "80:80"
    environment:
      - TZ=Europe/Amsterdam
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped
  mariadb:
    image: mariadb:10.11
    environment:
      TZ: Europe/Amsterdam
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    environment:
      - TZ=Europe/Amsterdam
  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8000:80"
    environment:
      - TZ=Europe/Amsterdam
      - PMA_ARBITRARY=1 # allows connecting to any host — disable in non-local environments
      - PMA_HOST=mariadb
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./.docker/phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php
volumes:
  dbdata:
